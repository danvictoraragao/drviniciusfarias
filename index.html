    <style>
    /*
      PALETA DO PROJETO — Vinícius Farias Advocacia
      Gerada em: 2026-06-22

      MODO CLARO
      --cor-fundo:          #FFFFFF  (origem: briefing)
      --cor-fundo-sec:      #F5F4F0  (origem: briefing — off-white quente)
      --cor-texto:          #1A1A1A  (origem: briefing)
      --cor-texto-sec:      #6B6B6B  (origem: briefing)
      --cor-primaria:       #C9A84C  (origem: briefing — dourado/âmbar)
      --cor-primaria-hover: #B8973A  (origem: inferida — 10% mais escura)

      MODO ESCURO
      --cor-fundo:          #111111  (origem: briefing — fundo escuro)
      --cor-fundo-sec:      #1A1A1A  (origem: inferida — 6% mais clara que fundo)
      --cor-texto:          #F0EDE8  (origem: inferida — quase-branco quente)
      --cor-texto-sec:      #A0A0A0  (origem: inferida)
      --cor-primaria:       #D4B85A  (origem: inferida — 12% mais clara para contraste)
      --cor-primaria-hover: #E0C76A  (origem: inferida)

      CONTRASTE VERIFICADO: texto/fundo claro 14.5:1 / texto/fundo escuro 13.2:1
    */

    [data-theme="light"] {
      --cor-fundo: #FFFFFF;
      --cor-fundo-sec: #F5F4F0;
      --cor-fundo-dark: #111111;
      --cor-fundo-dark-sec: #0A0A0A;
      --cor-texto: #1A1A1A;
      --cor-texto-sec: #6B6B6B;
      --cor-texto-light: #FFFFFF;
      --cor-texto-light-sec: #999999;
      --cor-primaria: #C9A84C;
      --cor-primaria-hover: #B8973A;
      --cor-borda: rgba(0,0,0,0.10);
      --cor-borda-card: #E8E3D8;
      --cor-sombra: rgba(0,0,0,0.08);
      --header-bg: rgba(255,255,255,0.95);
      --header-border: rgba(0,0,0,0.06);
    }

    [data-theme="dark"] {
      --cor-fundo: #111111;
      --cor-fundo-sec: #1A1A1A;
      --cor-fundo-dark: #0A0A0A;
      --cor-fundo-dark-sec: #070707;
      --cor-texto: #F0EDE8;
      --cor-texto-sec: #A0A0A0;
      --cor-texto-light: #F0EDE8;
      --cor-texto-light-sec: #888888;
      --cor-primaria: #D4B85A;
      --cor-primaria-hover: #E0C76A;
      --cor-borda: rgba(255,255,255,0.10);
      --cor-borda-card: rgba(255,255,255,0.12);
      --cor-sombra: rgba(0,0,0,0.35);
      --header-bg: rgba(17,17,17,0.95);
      --header-border: rgba(255,255,255,0.06);
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      transition: color 0.3s ease, background-color 0.3s ease,
                  border-color 0.3s ease, box-shadow 0.3s ease;
    }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body { overflow-x: hidden;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      color: var(--cor-texto);
      background: var(--cor-fundo);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    img { max-width: 100%; height: auto; display: block; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    ul, ol { list-style: none; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    .label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cor-primaria);
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      line-height: 1.15;
      color: var(--cor-texto);
    }

    .gold-line {
      width: 60px; height: 1px;
      background: var(--cor-primaria);
      margin: 20px 0;
    }

    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 16px 36px;
      background: var(--cor-fundo-dark);
      color: var(--cor-texto-light);
      font-size: 14px; font-weight: 500;
      letter-spacing: 0.05em;
      border-radius: 2px;
      min-height: 44px; min-width: 44px;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .btn-primary:hover { background: var(--cor-primaria); color: #fff; transform: translateY(-1px); }

    .btn-gold {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 16px 36px;
      background: var(--cor-primaria);
      color: #111;
      font-size: 14px; font-weight: 600;
      letter-spacing: 0.05em;
      border-radius: 2px;
      min-height: 44px; min-width: 44px;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .btn-gold:hover { background: var(--cor-primaria-hover); transform: translateY(-1px); }

    .btn-outline {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 14px 32px;
      background: transparent;
      color: var(--cor-primaria);
      font-size: 14px; font-weight: 500;
      letter-spacing: 0.05em;
      border: 1px solid var(--cor-primaria);
      border-radius: 2px;
      min-height: 44px; min-width: 44px;
      transition: all 0.3s ease;
    }
    .btn-outline:hover { background: var(--cor-primaria); color: #111; }

    .fade-in {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* ===== HEADER ===== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--header-border);
      padding: 0 24px;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 72px;
    }
    .header-logo {
      display: flex; align-items: center; gap: 10px; text-decoration: none;
    }
    .logo-symbol { height: 47px; width: auto; display: block; }
    .logo-name   { height: 35px; width: auto; display: block; }
    .header-nav { display: flex; align-items: center; gap: 32px; }
    .header-nav a {
      font-size: 13px; font-weight: 500; color: var(--cor-texto-sec);
      letter-spacing: 0.02em; transition: color 0.3s ease;
      padding: 8px 0;
    }
    .header-nav a:hover { color: var(--cor-primaria); }
    .header-controls { display: flex; align-items: center; gap: 8px; }
    .header-mobile-btn {
      display: none; width: 44px; height: 44px;
      align-items: center; justify-content: center;
      color: var(--cor-texto);
    }
    .mobile-menu {
      display: none; position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
      background-color: var(--cor-fundo); z-index: 1001;
      padding: 40px 24px; flex-direction: column; gap: 24px;
      overflow-y: auto;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: 18px; font-weight: 500; color: var(--cor-texto);
      padding: 12px 0; border-bottom: 1px solid var(--cor-borda);
    }
    .mobile-menu-controls { display: none; }

    /* ===== HERO ===== */
    .hero {
      position: relative; min-height: 100vh;
      overflow: hidden; background: var(--cor-fundo);
    }
    .hero-bg {
      position: absolute; top: 0; right: 0; width: 58%; height: 100%;
      z-index: 1;
    }
    .hero-bg img {
      width: 100%; height: 100%; object-fit: cover;
      will-change: transform;
    }
    .hero-bg::after {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to right, var(--cor-fundo) 52%, transparent 88%);
    }
    [data-theme="dark"] .hero-bg::after {
      background: linear-gradient(to right, var(--cor-fundo) 38%, rgba(17,17,17,0.55) 62%, transparent 90%);
    }
    .hero-inner {
      display: flex; align-items: stretch;
      min-height: 100vh; padding-top: 72px;
    }
    .hero-portrait {
      position: relative; z-index: 2;
      flex: 0 0 42%; overflow: hidden;
      background: var(--cor-fundo);
    }
    .hero-portrait img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 130%;
      object-fit: cover; object-position: top center;
      display: block;
    }
    .hero-portrait::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 220px;
      background: linear-gradient(to bottom, transparent, var(--cor-fundo));
      pointer-events: none;
    }
    .hero-content {
      position: relative; z-index: 2;
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      padding: 80px 48px 80px 64px; max-width: 660px;
    }
    .hero-headline {
      font-size: clamp(42px, 5vw, 68px);
      margin-top: 16px;
    }
    .hero-headline em {
      font-weight: 600; font-style: italic;
    }
    .hero-subtitle {
      font-size: 17px; color: var(--cor-texto-sec);
      max-width: 420px; margin-top: 24px; line-height: 1.7;
    }
    .hero-ctas { margin-top: 40px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .hero-link {
      color: var(--cor-primaria); font-size: 14px; font-weight: 500;
      display: inline-flex; align-items: center; gap: 8px;
      transition: gap 0.3s ease;
    }
    .hero-link:hover { gap: 12px; }
    .hero-badges {
      position: relative; z-index: 2;
      display: flex; gap: 0; margin-top: 60px;
      border: 1px solid var(--cor-primaria); border-radius: 2px;
      overflow: hidden; width: fit-content;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
    }
    [data-theme="dark"] .hero-badges {
      background: rgba(17,17,17,0.6);
    }
    .hero-badge {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px;
    }
    .hero-badge + .hero-badge { border-left: 1px solid var(--cor-primaria); }
    .hero-badge-icon {
      width: 24px; height: 24px; flex-shrink: 0;
      color: var(--cor-primaria);
    }
    .hero-badge-text { font-size: 12px; line-height: 1.4; }
    .hero-badge-text strong { display: block; font-weight: 600; font-size: 13px; color: var(--cor-texto); }
    .hero-badge-text span { color: var(--cor-texto-sec); font-size: 11px; }

    .hero-entry-1 { opacity:0; animation: heroFade 0.8s 0.2s forwards; }
    .hero-entry-2 { opacity:0; animation: heroFade 0.8s 0.5s forwards; }
    .hero-entry-3 { opacity:0; animation: heroFade 0.8s 0.8s forwards; }
    .hero-entry-4 { opacity:0; animation: heroFade 0.8s 1.1s forwards; }
    .hero-entry-5 { opacity:0; animation: heroFade 0.8s 1.4s forwards; }
    @keyframes heroFade {
      from { opacity:0; transform: translateY(20px); }
      to { opacity:1; transform: translateY(0); }
    }

    /* ===== SOCIAL PROOF ===== */
    .social-proof {
      background: var(--cor-fundo-dark);
      padding: 100px 0;
      border-top: 1px solid var(--cor-primaria);
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0; text-align: center;
    }
    .stat-item { padding: 20px; position: relative; }
    .stat-item + .stat-item::before {
      content: ''; position: absolute; left: 0; top: 20%; height: 60%;
      width: 1px; background: var(--cor-primaria); opacity: 0.3;
    }
    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 600;
      color: var(--cor-primaria);
      line-height: 1;
    }
    .stat-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--cor-texto-light-sec);
      margin-top: 12px;
    }
    .seen-in {
      margin-top: 60px; text-align: center;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 40px;
    }
    .seen-in-label {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--cor-texto-light-sec); margin-bottom: 24px;
    }
    .seen-in-logos {
      display: flex; justify-content: center; align-items: center;
      gap: 40px; flex-wrap: wrap; opacity: 0.4;
    }
    .seen-in-logos span {
      font-family: 'Playfair Display', serif;
      font-size: 16px; color: var(--cor-texto-light-sec);
      font-style: italic;
    }

    /* ===== SERVICES ===== */
    .services { background: var(--cor-fundo-sec); padding: 120px 0; }
    .section-header { max-width: 600px; margin-bottom: 60px; }
    .section-header .headline { font-size: clamp(32px, 4vw, 48px); margin-top: 12px; }
    .section-header .subtitle {
      font-size: 17px; color: var(--cor-texto-sec);
      margin-top: 20px; line-height: 1.7;
    }
    .services-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .service-card {
      background: var(--cor-fundo);
      border: 1px solid var(--cor-borda-card);
      padding: 40px; border-radius: 2px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .service-card:hover {
      border-color: var(--cor-primaria);
      box-shadow: 0 4px 24px var(--cor-sombra);
    }
    .service-icon {
      width: 32px; height: 32px; color: var(--cor-primaria);
      margin-bottom: 20px;
    }
    .service-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 600;
      margin-bottom: 12px; color: var(--cor-texto);
    }
    .service-card p {
      font-size: 15px; color: var(--cor-texto-sec); line-height: 1.7;
      margin-bottom: 20px;
    }
    .service-link {
      font-size: 13px; font-weight: 500; color: var(--cor-primaria);
      display: inline-flex; align-items: center; gap: 6px;
      transition: gap 0.3s ease;
    }
    .service-link:hover { gap: 10px; }
    .urgency-box {
      margin-top: 48px; background: var(--cor-fundo-dark);
      padding: 48px; text-align: center; border-radius: 2px;
    }
    .urgency-box p {
      font-size: 18px; color: var(--cor-texto-light);
      max-width: 640px; margin: 0 auto 24px; line-height: 1.7;
    }

    /* ===== CALCULATOR ===== */
    .calculator { background: var(--cor-fundo); padding: 120px 0; }
    .calc-wrapper { max-width: 780px; margin: 0 auto; }
    .calc-progress {
      display: flex; align-items: center; justify-content: center;
      gap: 0; margin-bottom: 48px;
    }
    .calc-step-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
      border: 2px solid var(--cor-borda-card);
      color: var(--cor-texto-sec); background: var(--cor-fundo);
      transition: all 0.3s ease; flex-shrink: 0;
    }
    .calc-step-dot.active {
      border-color: var(--cor-primaria);
      background: var(--cor-primaria); color: #111;
    }
    .calc-step-dot.done {
      border-color: var(--cor-primaria);
      background: var(--cor-primaria); color: #111;
    }
    .calc-step-line {
      height: 2px; width: 40px; background: var(--cor-borda-card);
      transition: background 0.3s ease;
    }
    .calc-step-line.done { background: var(--cor-primaria); }
    .calc-question {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 3vw, 28px);
      text-align: center; margin-bottom: 32px;
      color: var(--cor-texto);
    }
    .calc-options { display: flex; flex-direction: column; gap: 12px; }
    .calc-option {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 24px;
      border: 1px solid var(--cor-borda-card);
      border-radius: 2px;
      cursor: pointer; transition: all 0.3s ease;
      background: var(--cor-fundo);
      font-size: 15px; color: var(--cor-texto);
      text-align: left;
      min-height: 44px;
      width: 100%;
    }
    .calc-option:hover { border-color: var(--cor-texto-sec); }
    .calc-option.selected {
      border-color: var(--cor-primaria);
      background: rgba(201,168,76,0.06);
    }
    [data-theme="dark"] .calc-option.selected {
      background: rgba(212,184,90,0.1);
    }
    .calc-radio {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--cor-borda-card);
      flex-shrink: 0; position: relative;
      transition: border-color 0.3s ease;
    }
    .calc-option.selected .calc-radio {
      border-color: var(--cor-primaria);
    }
    .calc-option.selected .calc-radio::after {
      content: ''; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--cor-primaria);
    }
    .calc-nav {
      display: flex; justify-content: space-between;
      margin-top: 32px; gap: 16px;
    }
    .calc-result {
      text-align: center; padding: 40px 0;
    }
    .calc-result-icon {
      width: 64px; height: 64px; margin: 0 auto 24px;
      background: var(--cor-primaria); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulseCheck 0.6s ease;
    }
    @keyframes pulseCheck {
      0% { transform: scale(0); } 50% { transform: scale(1.15); } 100% { transform: scale(1); }
    }
    .calc-result h3 {
      font-family: 'Playfair Display', serif;
      font-size: 28px; margin-bottom: 16px; color: var(--cor-texto);
    }
    .calc-result p {
      font-size: 16px; color: var(--cor-texto-sec);
      max-width: 520px; margin: 0 auto 32px; line-height: 1.7;
    }
    .calc-result .note {
      font-size: 13px; color: var(--cor-texto-sec); margin-top: 12px;
    }

    /* ===== PROCESS ===== */
    .process { background: var(--cor-fundo-dark); padding: 120px 0; }
    .process-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 80px; align-items: start;
    }
    .process-header { position: sticky; top: 120px; }
    .process-header .label { color: var(--cor-primaria); }
    .process-header .headline {
      font-size: clamp(32px, 4vw, 44px);
      color: var(--cor-texto-light); margin-top: 12px;
    }
    .process-header .subtitle {
      font-size: 17px; color: var(--cor-texto-light-sec);
      margin-top: 20px; line-height: 1.7;
    }
    .process-steps { display: flex; flex-direction: column; gap: 48px; }
    .process-step { position: relative; padding-left: 40px; }
    .process-step::before {
      content: ''; position: absolute; left: 11px; top: 32px;
      width: 1px; height: calc(100% + 48px);
      background: var(--cor-primaria); opacity: 0.3;
    }
    .process-step:last-child::before { display: none; }
    .process-step-dot {
      position: absolute; left: 0; top: 6px;
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--cor-primaria);
    }
    .process-step-number {
      font-family: 'Playfair Display', serif;
      font-size: 100px; font-weight: 600;
      color: var(--cor-primaria); opacity: 0.1;
      line-height: 1; margin-bottom: -30px;
      position: relative; z-index: 0;
    }
    .process-step h3 {
      font-family: 'Playfair Display', serif;
      font-size: 24px; font-weight: 600;
      color: var(--cor-texto-light); margin-bottom: 12px;
      position: relative; z-index: 1;
    }
    .process-step p {
      font-size: 15px; color: var(--cor-texto-light-sec);
      line-height: 1.7; margin-bottom: 12px;
    }
    .process-step .detail {
      font-size: 13px; color: var(--cor-primaria);
      letter-spacing: 0.02em;
    }

    /* ===== ABOUT ===== */
    .about { background: var(--cor-fundo-sec); padding: 120px 0; }
    .about-grid {
      display: grid; grid-template-columns: 2fr 3fr;
      gap: 60px; align-items: start;
    }

    function useLang() {
      const [lang, setLang] = useState(() => localStorage.getItem('lang') || 'pt');
      const changeLang = (code) => {
        setLang(code);
        localStorage.setItem('lang', code);
        document.documentElement.lang = code === 'pt' ? 'pt-BR' : code;
      };
      return [lang, changeLang];
    }

    function useTheme() {
      const [theme, setTheme] = useState(() => document.documentElement.getAttribute('data-theme') || 'light');
      const toggle = () => {
        const next = theme === 'light' ? 'dark' : 'light';
        setTheme(next);
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      };
      return [theme, toggle];
    }

    function useInView(options = {}) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.15, ...options });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return [ref, visible];
    }

    function SocialProof({ t }) {
      const [ref, visible] = useInView();
      const [counts, setCounts] = useState([0,0,0,0]);
      const targets = [1200, 2.4, 98, 10];
      useEffect(() => {
        if (!visible) return;
        const duration = 2000;
        const start = performance.now();
        const step = (now) => {
          const p = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          setCounts(targets.map((v,i) => {
            if (i === 1) return (v * ease).toFixed(1);
            return Math.round(v * ease);
          }));
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [visible]);
      const display = [
        `+${counts[0].toLocaleString('pt-BR')}`,
        `R$ ${counts[1]}M+`,
        `${counts[2]}%`,
        `+${counts[3]}`
      ];
      return (
        <section className="social-proof" ref={ref}>

            <div className="stats-grid">
              {[0,1,2,3].map(i => (
                <div className="stat-item" key={i}>

    function Calculator({ t, lang }) {
      const [step, setStep] = useState(0);
      const [answers, setAnswers] = useState({});
      const [ref, visible] = useInView();
      const questions = [
        { q: t.calc.q1, o: t.calc.o1 },
        { q: t.calc.q2, o: t.calc.o2 },
        { q: t.calc.q3, o: t.calc.o3 },
        { q: t.calc.q4, o: t.calc.o4 },
        { q: t.calc.q5, o: t.calc.o5 },
      ];
      const select = (val) => { setAnswers({...answers, [step]: val}); };
      const next = () => { if (answers[step] !== undefined && step < 5) setStep(step + 1); };
      const prev = () => { if (step > 0) setStep(step - 1); };
      const getResult = () => {
        const a0 = answers[0], a3 = answers[3], a4 = answers[4];
        if (a0 === 2 && (a3 === 0 || a3 === 1)) return t.calc.resultA;
        if (a4 === 1) return t.calc.resultB;
        return t.calc.resultC;
      };
      const waLink = `https://wa.me/${WHATSAPP}?text=${encodeURIComponent(i18n[lang].whatsappMsg)}`;
      const done = step === 5;
      return (
        <section className="calculator" ref={ref}>
          <div className="container">
            <div className="calc-wrapper">
              <div className={`section-header fade-in ${visible ? 'visible' : ''}`} style={{ textAlign:'center', maxWidth:'100%' }}>

              <div style={{ marginTop: 48 }}>
                <div className="calc-progress">
                  {[0,1,2,3,4].map(i => (
                    <React.Fragment key={i}>
                      <div className={`calc-step-dot ${i < step ? 'done' : ''} ${i === step && !done ? 'active' : ''} ${done ? 'done' : ''}`}>{i+1}</div>
                      {i < 4 && <div className={`calc-step-line ${i < step || done ? 'done' : ''}`}></div>}
                    </React.Fragment>
                  ))}
                </div>
                {!done ? (
                  <div>
                    <h3 className="calc-question">{questions[step].q}</h3>
                    <div className="calc-options">
                      {questions[step].o.map((opt, i) => (
                        <button key={i} className={`calc-option ${answers[step] === i ? 'selected' : ''}`}
                          onClick={() => select(i)}>
                          <div className="calc-radio"></div>
                          {opt}
                        </button>
                      ))}
                    </div>
                    <div className="calc-nav">
                      {step > 0 ? <button className="btn-outline" onClick={prev}>{t.calc.prev}</button> : <div></div>}
                      <button className="btn-primary" onClick={next}
                        style={{ opacity: answers[step] !== undefined ? 1 : 0.4 }}>{t.calc.next}</button>
                    </div>
                  </div>
                ) : (
                  <div className="calc-result">
                    <div className="calc-result-icon">
                      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#111" strokeWidth="2.5"><path d="M20 6L9 17l-5-5"/></svg>
                    </div>
                    <h3>{t.calc.resultTitle}</h3>
                    <p>{getResult()}</p>
                    <a href={waLink} target="_blank" rel="noopener noreferrer" className="btn-primary">{t.calc.resultCta}</a>
                    <p className="note">{t.calc.resultNote}</p>
                  </div>
                )}

            </div>
          </div>
        </section>
      );
    }

              <img src="assets/MU-fotoperfildrvinicius.png" alt="Vídeo de apresentação" loading="lazy"
                style={{ objectFit:'cover', objectPosition:'center top' }} />
              <div className="video-play">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="#111"><polygon points="9,5 19,12 9,19"/></svg>
              </div>
            </div>
            <p className="video-caption" style={{ fontStyle:'italic', color:'var(--cor-texto-sec)', textAlign:'center', marginTop:16, fontSize:14 }}>{t.about.videoCaption}</p>
          </div>
        </section>
      );
    }

    function Testimonials({ t }) {
      const [ref, visible] = useInView();
      const [idx, setIdx] = useState(0);
      const [perView, setPerView] = useState(3);
      useEffect(() => {
        const update = () => setPerView(window.innerWidth < 768 ? 1 : window.innerWidth < 1024 ? 2 : 3);
        update();
        window.addEventListener('resize', update);
        return () => window.removeEventListener('resize', update);
      }, []);
      const maxIdx = Math.max(0, t.testimonials.items.length - perView);
      const goTo = (i) => setIdx(Math.max(0, Math.min(i, maxIdx)));
      return (
        <section className="testimonials" ref={ref}>
          <div className="container">
            <div className={`section-header fade-in ${visible ? 'visible' : ''}`}>
              <span className="label">{t.testimonials.label}</span>
              <div className="gold-line"></div>
              <h2 className="headline">{t.testimonials.headline}</h2>
            </div>
            <div className="testimonials-carousel">
              <div className="testimonials-track" style={{ transform: `translateX(-${idx * (100 / perView)}%)` }}>
                {t.testimonials.items.map((item, i) => (
                  <div className="testimonial-card" key={i}>
                    <span className="testimonial-quote">&ldquo;</span>
                    <p>&ldquo;{item.text}&rdquo;</p>
                    {item.note && <p style={{ fontSize:12, fontStyle:'italic', color:'var(--cor-texto-sec)', marginBottom:8 }}>{item.note}</p>}
                    <div className="testimonial-author">— {item.name}</div>
                    <div className="testimonial-location">{item.loc}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="carousel-controls">
              <button className="carousel-arrow" onClick={() => goTo(idx - 1)} aria-label="Anterior">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>
              </button>
              <div className="carousel-dots">
                {Array.from({ length: maxIdx + 1 }, (_, i) => (
                  <button key={i} className={`carousel-dot ${i === idx ? 'active' : ''}`}
                    onClick={() => goTo(i)} aria-label={`Slide ${i+1}`}></button>
                ))}
              </div>
              <button className="carousel-arrow" onClick={() => goTo(idx + 1)} aria-label="Próximo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>
              </button>
            </div>
          </div>
        </section>
      );
    }

    function Publications({ t }) {
      const [ref, visible] = useInView();
      return (
        <section className="publications" id="artigos" ref={ref}>
          <div className="container">
            <div className={`section-header fade-in ${visible ? 'visible' : ''}`}>
              <span className="label">{t.publications.label}</span>
              <div className="gold-line"></div>
              <h2 className="headline">{t.publications.headline}</h2>
              <p className="subtitle">{t.publications.subtitle}</p>
            </div>
            <div className="articles-grid">
              {t.publications.articles.map((a, i) => (
                <div className={`article-card fade-in ${visible ? 'visible' : ''}`} key={i}
                  style={{ transitionDelay: `${i * 0.15}s` }}>
                  <div className="article-category">{a.cat}</div>
                  <h3>{a.title}</h3>
                  <p className="summary">{a.summary}</p>
                  <p className="date">{a.date}</p>
                  <a href="#" className="service-link">{t.publications.readMore} <span>&rarr;</span></a>
                </div>
              ))}
            </div>
            <div className="pub-cta">
              <a href="#" className="btn-outline">{t.publications.viewAll}</a>
            </div>
          </div>
        </section>
      );
    }

    function FAQ({ t }) {
      const [ref, visible] = useInView();
      const [openIdx, setOpenIdx] = useState(-1);
      const toggle = (i) => setOpenIdx(openIdx === i ? -1 : i);
      return (
        <section className="faq" id="faq" ref={ref}>
          <div className="container">
            <div className="faq-wrapper">
              <div className={`section-header fade-in ${visible ? 'visible' : ''}`} style={{ textAlign:'center', maxWidth:'100%' }}>
                <span className="label">{t.faq.label}</span>
                <div className="gold-line" style={{ margin:'16px auto' }}></div>
                <h2 className="headline">{t.faq.headline}</h2>
              </div>
              <div style={{ marginTop: 48 }}>
                {t.faq.items.map((item, i) => (
                  <div className="faq-item" key={i}>
                    <button className="faq-question" onClick={() => toggle(i)} aria-expanded={openIdx === i}>
                      <span>{item.q}</span>
                      <span className={`faq-icon ${openIdx === i ? 'open' : ''}`}>+</span>
                    </button>
                    <div className={`faq-answer ${openIdx === i ? 'open' : ''}`}>
                      <p>{item.a}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    function CTAFinal({ t, lang }) {
      const [ref, visible] = useInView();
      const waLink = `https://wa.me/${WHATSAPP}?text=${encodeURIComponent(i18n[lang].whatsappMsg)}`;
      return (
        <section className="cta-final" id="contato" ref={ref}>
          <div className="container">
            <div className={`cta-final-content fade-in ${visible ? 'visible' : ''}`}>
              <span className="label">{t.ctaFinal.label}</span>
              <div className="gold-line" style={{ margin:'16px auto' }}></div>
              <h2 className="headline">{t.ctaFinal.headline} <em>{t.ctaFinal.headlineEm}</em></h2>
              <p className="subtitle">{t.ctaFinal.subtitle}</p>
              <a href={waLink} target="_blank" rel="noopener noreferrer" className="btn-gold">{t.ctaFinal.cta}</a>
              <p className="contact-alt">{t.ctaFinal.alt} <a href="tel:+5598981366320">(98) 9 8136-6320</a></p>
            </div>
          </div>
        </section>
      );
    }

    function Footer({ t }) {
      const navItems = [
        { key:'inicio', href:'#hero' }, { key:'servicos', href:'#servicos' },
        { key:'sobre', href:'#sobre' }, { key:'artigos', href:'#artigos' },
        { key:'faq', href:'#faq' }, { key:'contato', href:'#contato' },
      ];
      return (
        <footer className="footer">
          <div className="container">
            <div className="footer-grid">
              <div>
                <div className="footer-brand-name">Vinícius Farias</div>
                <div className="footer-brand-sub">Advocacia</div>
                <p className="footer-brand-tagline">{t.footer.tagline}</p>
                <p className="footer-brand-address">Av. Colares Moreira, Ed. Planta Tower, Sala 802<br/>Jardim Renascença, São Luís – MA</p>
                <iframe
                  className="footer-map"
                  title="Localização do escritório"
                  src="https://maps.google.com/maps?q=Edificio+Planta+Tower,+Av.+Colares+Moreira,+S%C3%A3o+Lu%C3%ADs,+MA,+Brasil&output=embed&hl=pt-BR"
                  loading="lazy"
                  referrerPolicy="no-referrer-when-downgrade"
                  allowFullScreen
                />
              </div>
              <div className="footer-col">
                <h4>{t.footer.nav}</h4>
                {navItems.map(i => <a key={i.key} href={i.href}>{t.nav[i.key]}</a>)}
              </div>
              <div className="footer-col">
                <h4>{t.footer.contact}</h4>
                <a href="tel:+5598981366320">(98) 9 8136-6320</a>
                <a href="mailto:viniciusfeitosafarias@gmail.com">viniciusfeitosafarias@gmail.com</a>
                <a href="https://wa.me/5598981366320" target="_blank" rel="noopener noreferrer">WhatsApp</a>
                <p style={{ fontSize:13, color:'var(--cor-texto-light-sec)', marginTop:8 }}>{t.footer.hours}</p>
                <div className="footer-social">
                  <a href="https://instagram.com/viniciusfariasadv" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                      <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor"/>
                    </svg>
                  </a>
                  <a href="#" aria-label="LinkedIn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                      <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
                    </svg>
                  </a>
                </div>
              </div>
            </div>
            <div className="footer-bottom">
              <p>{t.footer.copy}</p>
              <p>{t.footer.disclaimer}</p>
            </div>
          </div>
        </footer>
      );
    }

    function WhatsAppButton({ lang }) {
      const waLink = `https://wa.me/${WHATSAPP}?text=${encodeURIComponent(i18n[lang].whatsappMsg)}`;
      return (
        <a href={waLink} target="_blank" rel="noopener noreferrer" className="whatsapp-float" aria-label="WhatsApp">
          <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </a>
      );
    }

    // ==================== APP ====================
    function App() {
      const [lang, changeLang] = useLang();
      const [theme, toggleTheme] = useTheme();
      const t = i18n[lang];
      return (
        <>
          <Header t={t} lang={lang} onLangChange={changeLang} theme={theme} onThemeToggle={toggleTheme} />
          <main>
            <Hero t={t} lang={lang} />
            <SocialProof t={t} />
            <Services t={t} lang={lang} />
            <Calculator t={t} lang={lang} />
            <Process t={t} />
            <About t={t} />
            <Testimonials t={t} />
            <Publications t={t} />
            <FAQ t={t} />
            <CTAFinal t={t} lang={lang} />
          </main>
          <Footer t={t} />
          <WhatsAppButton lang={lang} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
